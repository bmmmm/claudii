name: ShellCheck

on:
  push:
    branches: [main]
    paths: ['bin/**']
  pull_request:
    branches: [main]
    paths: ['bin/**']
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './bin'
          severity: warning
        env:
          SHELLCHECK_OPTS: --shell=bash --exclude=SC1090,SC1091,SC2034
