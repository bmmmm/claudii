name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq zsh

      - name: Run tests on clean env
        run: bash tests/run.sh --summary

      # Extract just this release's section from CHANGELOG. Headers carry the
      # v-prefix (## [v0.16.0] — DATE); we match either form for safety.
      - name: Extract release notes from CHANGELOG.md
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          awk -v t="$TAG" -v v="$VERSION" '
            $0 ~ "^## \\[" t "\\]" || $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d' > /tmp/changelog-section.md

      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "tarball_url=$URL"   >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"        >> "$GITHUB_OUTPUT"
          echo "Tarball $URL → SHA256 $SHA"

      - name: Build release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${TAG}$" | head -1 || true)
          {
            echo "## Install"
            echo '```bash'
            echo "brew tap bmmmm/tap && brew install claudii"
            echo '```'
            echo ""
            if [[ -s /tmp/changelog-section.md ]]; then
              cat /tmp/changelog-section.md
            else
              echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
            fi
            echo ""
            echo "---"
            echo "**Homebrew SHA256:** \`${{ steps.sha.outputs.sha256 }}\`"
            if [[ -n "$PREV" ]]; then
              echo "**Full Changelog:** [${PREV}...${TAG}](https://github.com/${{ github.repository }}/compare/${PREV}...${TAG})"
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "claudii ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

      # Sync the Homebrew tap. Needs a fine-grained PAT with `contents:write`
      # scoped to bmmmm/homebrew-tap, stored as `secrets.TAP_TOKEN`. If the
      # secret is missing the step logs a warning and skips — release stays
      # green so the human can update the Formula manually.
      - name: Update Homebrew tap
        if: success()
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TARBALL_URL: ${{ steps.sha.outputs.tarball_url }}
          TARBALL_SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "::warning::TAP_TOKEN not set — skipping Homebrew tap update"
            echo "Add a fine-grained PAT (contents:write on bmmmm/homebrew-tap)"
            echo "as the TAP_TOKEN secret to enable automatic tap sync."
            exit 0
          fi
          export GH_TOKEN="$TAP_TOKEN"

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          TAP_OWNER=bmmmm
          TAP_REPO=homebrew-tap
          TAP_FILE=Formula/claudii.rb

          TAP_SHA=$(gh api "repos/${TAP_OWNER}/${TAP_REPO}/contents/${TAP_FILE}" --jq '.sha')
          if [[ -z "$TAP_SHA" || "$TAP_SHA" == "null" ]]; then
            echo "::error::Could not fetch ${TAP_FILE} from ${TAP_OWNER}/${TAP_REPO}"
            exit 1
          fi

          CURRENT=$(gh api "repos/${TAP_OWNER}/${TAP_REPO}/contents/${TAP_FILE}" --jq '.content' | base64 -d)
          NEW=$(printf '%s\n' "$CURRENT" \
            | sed "s|url \"https://.*\\.tar\\.gz\"|url \"${TARBALL_URL}\"|" \
            | sed "s|sha256 \"[a-f0-9]*\"|sha256 \"${TARBALL_SHA}\"|" \
            | sed "s|version \"[0-9.]*\"|version \"${VERSION}\"|")

          ENCODED=$(printf '%s\n' "$NEW" | base64 -w0)

          gh api "repos/${TAP_OWNER}/${TAP_REPO}/contents/${TAP_FILE}" \
            --method PUT \
            --field message="chore: update claudii to ${TAG}" \
            --field content="$ENCODED" \
            --field sha="$TAP_SHA" \
            --jq '.commit.sha'

          echo "Homebrew tap synced to ${VERSION}"
