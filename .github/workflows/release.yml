name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests
        run: bash tests/run.sh

      - name: Build release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1 || echo "")
          {
            echo "## claudii $TAG"
            echo ""
            echo "Fast Claude Code aliases with live model status and session insights ♥"
            echo ""
            echo "### Install"
            echo '```bash'
            echo "brew tap bmmmm/tap && brew install claudii"
            echo '```'
            echo ""
            echo "### What's new"
            echo ""
            if [[ -n "$PREV" ]]; then
              git log --pretty="- %s" "$PREV..$TAG" | grep -v "Co-Authored-By"
            else
              git log --pretty="- %s" "$TAG" | head -20 | grep -v "Co-Authored-By"
            fi
            echo ""
            echo "### Tests"
            echo ""
            bash tests/run.sh 2>&1 | tail -1
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "claudii ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

      - name: Compute tarball SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256: $SHA"
          echo "SHA256=$SHA" >> "$GITHUB_ENV"
          echo ""
          echo "Update Formula/claudii.rb and homebrew-tap with:"
          echo "  sha256 \"$SHA\""
