name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Tests already verified by CI on main + locally by scripts/release.sh
      # before the tag was created — no redundant re-run here.

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract release notes from CHANGELOG.md
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Extract the curated section for this version from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > /tmp/changelog-section.md
          {
            echo "## Install"
            echo '```bash'
            echo "brew tap bmmmm/tap && brew install claudii"
            echo '```'
            echo ""
            if [[ -s /tmp/changelog-section.md ]]; then
              cat /tmp/changelog-section.md
            else
              echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "claudii ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

      - name: Compute tarball SHA256 and append to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_ENV"
          CURRENT=$(gh release view "$TAG" --json body -q .body)
          gh release edit "$TAG" --notes "${CURRENT}

---
**Homebrew Formula SHA256:** \`${SHA}\`"
