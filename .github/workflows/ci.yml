name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh

      - name: Run tests
        run: bash tests/run.sh

      - name: brew audit (style check)
        if: runner.os == 'macOS'
        run: brew audit --formula Formula/claudii.rb
        continue-on-error: true

