name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run tests
        run: bash tests/run.sh

  brew-audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: brew audit (style check)
        run: brew audit --formula Formula/claudii.rb || true
