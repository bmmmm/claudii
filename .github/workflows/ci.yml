name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq zsh

      - name: Run tests
        run: bash tests/run.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: tests
          severity: warning
        env:
          SHELLCHECK_OPTS: --shell=bash --exclude=SC1090,SC1091,SC2034

  brew-audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: brew audit (style check)
        run: brew audit --formula Formula/claudii.rb
        continue-on-error: true
