name: Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [man/man1/claudii.1]

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert man page to markdown
        run: |
          # Convert and clean up
          pandoc -f man -t gfm --wrap=none man/man1/claudii.1 > /tmp/raw.md

          # Build clean wiki page
          cat > /tmp/Home.md << 'HEADER'
          # claudii ♥

          > Fast Claude Code aliases with live model status and session insights.

          _Auto-generated from [`man claudii`](https://github.com/bmmmm/claudii/blob/main/man/man1/claudii.1) — do not edit directly._

          ---

          HEADER
          # Strip leading spaces from heredoc
          sed -i 's/^          //' /tmp/Home.md

          # Extract and clean content (skip NAME heading, keep rest)
          sed '/^# NAME/,/^# /{/^# [^N]/!d}; /^# CLAUDII/d' /tmp/raw.md \
            | sed 's/^# /## /g; s/^## /## /g; s/^### /### /g' \
            | sed '/^## SEE ALSO/,$d' \
            >> /tmp/Home.md

          # Add footer
          cat >> /tmp/Home.md << 'FOOTER'

          ---

          ## Links

          - [GitHub](https://github.com/bmmmm/claudii)
          - [Install](https://github.com/bmmmm/claudii#install)
          - [Releases](https://github.com/bmmmm/claudii/releases)
          - [Claude Code Status Line by wynandw87](https://github.com/wynandw87/claude-code-statusline)
          FOOTER

      - name: Create sidebar
        run: |
          cat > /tmp/_Sidebar.md << 'EOF'
          **claudii** ♥

          - [[Home]]
          - [README](https://github.com/bmmmm/claudii#readme)
          - [Install](https://github.com/bmmmm/claudii#install)
          - [Releases](https://github.com/bmmmm/claudii/releases)
          - [Contributing](https://github.com/bmmmm/claudii/blob/main/CONTRIBUTING.md)

          **Sections**
          - [Aliases](#aliases)
          - [ClaudeStatus](#claudestatus)
          - [Claude Code Status Line](#claude-code-status-line-by-wynandw87)
          - [Config](#config)
          - [Environment](#environment)
          - [Examples](#examples)
          EOF
          sed -i 's/^          //' /tmp/_Sidebar.md

      - name: Push to wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki 2>/dev/null || {
            mkdir /tmp/wiki && cd /tmp/wiki && git init
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          }
          cp /tmp/Home.md /tmp/wiki/Home.md
          cp /tmp/_Sidebar.md /tmp/wiki/_Sidebar.md
          cd /tmp/wiki
          git add Home.md _Sidebar.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: update wiki from man page"
          git push origin HEAD:master || git push origin HEAD:main
